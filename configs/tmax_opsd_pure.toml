# Pure OPSD (on-policy self-distillation) on TMax — PIPELINE VALIDATION run.
#
# Distills the policy toward a hint-conditioned version of itself: each on-policy
# rollout is prefill-scored with the task's `demo` hint prepended, and the
# reverse-KL to that demo-conditioned policy is the per-token loss. No reward,
# no frozen teacher — only the policy's own inference server is needed.
#
# Launch (from the prime-rl repo; the policy server auto-launches):
#   uv run rl @ <path>/configs/tmax_opsd_pure.toml --output-dir outputs/opsd
#
# NOTE: rollouts still run each task in its per-task Docker sandbox, so this
# needs the sandbox backend (prime runtime or docker) — it is NOT text-only.
# Data note: no data_path is set, so the env builds tasks.parquet lazily into
# its cache ($TMAX_OPSD_DATA_DIR) with the hints that ship inside the package.

max_steps = 300          # RL steps. TMax paper uses 500; 300 is a fine validation. tune.
seq_len = 32768          # TMax paper: 65536 for Qwen 3.5 (32768 train / 40960 eval to save
                         # memory). 32768 is the practical choice; raise toward 65536 if VRAM allows.

[model]
# TMax RL models are the Qwen 3.5 family (headline: Qwen 3.5 9B -> TMAX-9B; 4B/2B
# reported too). Plain "Qwen/Qwen3.5-4B" (post-trained) tool-calls out of the box
# and matches your existing 0.8B config. To reproduce the paper exactly, start
# from "Qwen/Qwen3.5-4B-Base" + an SFT warm-start, then RL.
name = "Qwen/Qwen3.5-4B"

[wandb]
project = "tmax-opsd"
name = "pure-opsd-qwen3.5-4b"

[orchestrator]
batch_size = 32          # examples per step. tune to GPU/throughput.
group_size = 1           # OPSD assigns no advantage -> 1 rollout/example (GRPO uses 32).

[orchestrator.algo]
type = "opsd"
demo_key = "demo"        # our TMaxData field holding the hint (default is "demonstration").
# template = "..."       # optional wrapper for the hint system message; default is fine.

[orchestrator.renderer]
name = "qwen3"           # match the policy's chat/tool format. tune to the model.

[orchestrator.train.sampling]
max_completion_tokens = 16384    # TMax paper "Per-turn max tokens" = 16384 (Vanillux default). don't go low.

[[orchestrator.train.env]]
# v1 env: the id lives INSIDE the taskset block so verifiers dispatches to our
# TMaxTasksetConfig (which accepts require_demo). A top-level `id` instead routes
# through the legacy v0 bridge and the base TasksetConfig rejects require_demo.
# require_demo drops the 4,642 un-hinted tasks so OPSD never hits a null demo.
taskset = { id = "tmax_opsd_v1", require_demo = true, verifier_timeout = 600.0 }
harness = { max_steps = 64, command_timeout = 120.0 }   # TMax "Max tool/env steps" = 64; bash timeout 120s.

[orchestrator.eval]
interval = 50            # eval every N steps; watch `solved` / `pass_fraction`.
num_examples = 128

[orchestrator.eval.sampling]
max_completion_tokens = 16384

[[orchestrator.eval.env]]
taskset = { id = "tmax_opsd_v1", require_demo = true, verifier_timeout = 600.0 }
harness = { max_steps = 64, command_timeout = 120.0 }

[trainer.optim]
lr = 1e-6                # TMax paper LR (constant schedule). tune.

[inference]
gpu_memory_utilization = 0.6   # raise for a real run. tune.
